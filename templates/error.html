{% extends "base.html" %}

{% block content %}

<div class="min-h-screen flex items-center justify-center px-6">

    <div class="bg-red-500/10 border border-red-500/20 rounded-3xl p-10 max-w-2xl w-full text-center">

        <h1 class="text-5xl font-bold text-red-400 mb-6">
            Something Went Wrong
        </h1>

        <p class="text-slate-300 text-lg mb-8">
            {{ error_message }}
        </p>

        <a
            href="/"
            class="bg-blue-600 hover:bg-blue-700 px-8 py-4 rounded-2xl text-lg font-bold inline-block"
        >
            Go Back
        </a>

    </div>

</div>

{% endblock %}
